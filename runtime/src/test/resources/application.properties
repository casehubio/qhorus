# Use random port to avoid conflicts with other services (e.g. Claudony on 8081)
quarkus.http.test-port=0

# Test datasource — H2 in-memory (default).
# Required for casehub-ledger library beans (LedgerVerificationService,
# LedgerRetentionJob, etc.) that inject @Default EntityManager — these cannot
# be updated to use @PersistenceUnit("qhorus") as they are library code.
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Named 'qhorus' datasource — H2 in-memory for standard tests.
# Satisfies quarkus.hibernate-orm.qhorus.datasource=qhorus in main application.properties.
# JDBC URL and credentials are under %test profile so the reactive-pg profile does NOT
# inherit them — the reactive-pg profile leaves URL/credentials absent so DevServices
# can inject the PostgreSQL container URL and credentials at augmentation time.
%test.quarkus.datasource.qhorus.db-kind=h2
%test.quarkus.datasource.qhorus.username=sa
%test.quarkus.datasource.qhorus.password=
%test.quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Default PU packages — no JPA entities live here; this config is required by Quarkus
# when multiple persistence units exist. The config package has only @ConfigMapping
# classes. The @Default EntityManager from this PU satisfies casehub-ledger services.
quarkus.hibernate-orm.packages=io.casehub.qhorus.runtime.config

# Schema creation for both persistence units; Flyway disabled in tests.
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
quarkus.flyway.qhorus.migrate-at-start=false
# Create ledger_subject_sequence (not a JPA entity; drop-and-create misses it).
# Rows survive context restarts (DB_CLOSE_DELAY=-1); tests must use random UUIDs. Refs #256.
quarkus.hibernate-orm.qhorus.sql-load-script=import-qhorus-test.sql

# Omit null fields from JSON responses — keeps DispatchResult tidy when ledger fields are absent
quarkus.jackson.serialization-inclusion=non-null

# casehub-ledger — configuration for tests
# casehub.ledger.datasource=qhorus routes @LedgerPersistenceUnit EntityManager to the qhorus PU,
# enabling LedgerSequenceAllocator (used by JpaLedgerEntryRepository, activated in #255) to
# write to ledger_subject_sequence in the qhorus H2 schema. Refs #255, #256.
casehub.ledger.datasource=qhorus
casehub.ledger.enabled=true
casehub.ledger.hash-chain.enabled=true
casehub.ledger.decision-context.enabled=false
casehub.ledger.attestations.enabled=true
casehub.ledger.trust-score.enabled=false

# Exclude credential-bearing connectors pulled in via casehub-qhorus-connectors test dep.
# Safe to leave permanently — quarkus.arc.exclude-types for absent types is a no-op.
# GE-20260521-45e61c
quarkus.arc.exclude-types=io.casehub.connectors.twilio.TwilioSmsConnector,\
  io.casehub.connectors.whatsapp.WhatsAppConnector

